<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Praxio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:oklch(13% 0.05 272);--bg2:oklch(17% 0.052 272);--bg3:oklch(21% 0.052 272);
  --sur:rgba(255,255,255,0.04);--sur2:rgba(255,255,255,0.07);
  --bdr:rgba(255,255,255,0.09);--bdr2:rgba(255,255,255,0.17);
  --txt:#ede9f5;--txt2:rgba(237,233,245,0.52);--txt3:rgba(237,233,245,0.22);
  --acc:oklch(70% 0.19 28);--acc-d:oklch(70% 0.19 28 / 0.14);
  --acc-g:oklch(70% 0.19 28 / 0.26);--acc-b:oklch(40% 0.12 28);
  --vio:oklch(70% 0.17 295);--vio-d:oklch(70% 0.17 295 / 0.14);
  --amb:oklch(74% 0.14 72);--amb-d:oklch(74% 0.14 72 / 0.14);
  --red:oklch(62% 0.18 18);
  --fd:'Outfit',sans-serif;--fu:'Plus Jakarta Sans',sans-serif;--fm:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--fu);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes wv1{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
@keyframes wv2{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.25)}}
@keyframes wv3{0%,33%,100%{transform:scaleY(0.6)}66%{transform:scaleY(1)}}
@keyframes wv4{0%,100%{transform:scaleY(0.4)}40%{transform:scaleY(0.9)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 var(--acc-g)}50%{box-shadow:0 0 0 6px var(--acc-g)}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes progressBar{from{width:0}to{width:100%}}

.wu{animation:fadeUp 0.45s ease both;}
.wu1{animation-delay:0.05s}.wu2{animation-delay:0.12s}.wu3{animation-delay:0.22s}.wu4{animation-delay:0.35s}.wu5{animation-delay:0.5s}

.wv-bar{display:inline-block;width:3px;border-radius:2px;transform-origin:center;background:var(--acc);}
.wv-bar.s .wv-b0{animation:wv1 0.6s ease-in-out infinite}
.wv-bar.s .wv-b1{animation:wv2 0.7s ease-in-out infinite 0.1s}
.wv-bar.s .wv-b2{animation:wv3 0.5s ease-in-out infinite 0.05s}
.wv-bar.s .wv-b3{animation:wv1 0.8s ease-in-out infinite 0.2s}
.wv-bar.s .wv-b4{animation:wv4 0.65s ease-in-out infinite 0.15s}

/* Subtle noise texture overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── LogoMark ──────────────────────────────────────────────────────────────────
function LogoMark({ size = 28 }) {
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 28 28" fill="none" style={{flexShrink:0}}>
      <defs>
        <linearGradient id="lm-g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="oklch(70% 0.19 28)"/>
          <stop offset="100%" stopColor="oklch(70% 0.17 295)"/>
        </linearGradient>
      </defs>
      {/* Ghost — rotated back */}
      <rect x="5" y="5" width="18" height="18" rx="5.5"
        stroke="url(#lm-g)" strokeWidth="1.5" strokeOpacity="0.3"
        transform="rotate(-18 14 14)"/>
      {/* Main shape — slightly rotated */}
      <rect x="5" y="5" width="18" height="18" rx="5.5"
        stroke="url(#lm-g)" strokeWidth="2"
        transform="rotate(8 14 14)"/>
      {/* Center accent dot */}
      <circle cx="14" cy="14" r="2.2" fill="url(#lm-g)"/>
    </svg>
  );
}

// ── Physics ─────────────────────────────────────────────────────────────────
function computeArc(deg, v0, g=9.8, steps=90) {
  const a = deg * Math.PI / 180;
  const T = 2 * v0 * Math.sin(a) / g;
  const pts = Array.from({length: steps+1}, (_,i) => {
    const t = (i/steps)*T;
    return { x: v0*Math.cos(a)*t, y: v0*Math.sin(a)*t - 0.5*g*t*t };
  });
  return {
    pts, T,
    range: v0**2 * Math.sin(2*a) / g,
    maxH: (v0*Math.sin(a))**2 / (2*g),
    apex: { x: v0**2*Math.sin(2*a)/(2*g), y: (v0*Math.sin(a))**2/(2*g) }
  };
}

// ── Waveform ─────────────────────────────────────────────────────────────────
const waveDefs = [
  {h:10,a:'wv1',d:'0s'},{h:22,a:'wv2',d:'0.1s'},{h:32,a:'wv3',d:'0.05s'},
  {h:18,a:'wv1',d:'0.2s'},{h:28,a:'wv4',d:'0.12s'},{h:14,a:'wv2',d:'0.08s'},
  {h:26,a:'wv3',d:'0.18s'},{h:20,a:'wv1',d:'0.25s'},{h:30,a:'wv4',d:'0.06s'},
  {h:16,a:'wv2',d:'0.15s'},{h:24,a:'wv3',d:'0.22s'},{h:12,a:'wv1',d:'0.3s'}
];
function Waveform({ speaking, listening, color='var(--acc)', height=32, style={} }) {
  const active = speaking || listening;
  const c = listening ? 'var(--red)' : color;
  return (
    <div style={{display:'flex',alignItems:'center',gap:2.5,height,...style}}>
      {waveDefs.map((w,i) => (
        <span key={i} style={{
          display:'inline-block',width:3,borderRadius:2,transformOrigin:'center',
          background: c, opacity: active ? 1 : 0.3,
          height: active ? w.h : 4,
          animation: active ? `${w.a} ${0.5+i*0.04}s ease-in-out infinite ${w.d}` : 'none',
          transition:'height 0.3s ease, opacity 0.3s ease'
        }}/>
      ))}
    </div>
  );
}

// ── SimCanvas ────────────────────────────────────────────────────────────────
const VW = 1400, VH = 560;
const OX = 90, OY = 490;
const SCALE = 9.2;
function sv(px, py) { return { x: OX + px*SCALE, y: OY - py*SCALE }; }

function SimCanvas({ angle, velocity, showAnnotation, tutorSpeaking }) {
  const arc = computeArc(angle, velocity);
  const rafRef = useRef(null);
  const startRef = useRef(null);
  const [ballFrac, setBallFrac] = useState(0);
  const [trailFrac, setTrailFrac] = useState(0);

  useEffect(() => {
    startRef.current = null;
    setBallFrac(0);
    setTrailFrac(0);
    const dur = Math.max(arc.T * 900, 1800);
    const trailDur = 600;

    function tick(ts) {
      if (!startRef.current) startRef.current = ts;
      const el = ts - startRef.current;
      const tf = Math.min(el / trailDur, 1);
      const bf = Math.min(el / dur, 1);
      setTrailFrac(tf);
      setBallFrac(bf);
      if (bf < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        setTimeout(() => { startRef.current = null; rafRef.current = requestAnimationFrame(tick); }, 1200);
      }
    }
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [angle, velocity]);

  const visiblePts = arc.pts.slice(0, Math.max(2, Math.round(trailFrac * arc.pts.length)));
  const pathD = visiblePts.map((p,i) => { const {x,y} = sv(p.x,p.y); return `${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`; }).join('');
  const ghostD = arc.pts.map((p,i) => { const {x,y} = sv(p.x,p.y); return `${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`; }).join('');
  const ballIdx = Math.round(ballFrac * (arc.pts.length-1));
  const bp = arc.pts[ballIdx] || arc.pts[arc.pts.length-1];
  const bsv = sv(bp.x, bp.y);
  const apSV = sv(arc.apex.x, arc.apex.y);
  const landSV = sv(arc.range, 0);

  // Grid
  const gridX = [], gridY = [];
  for (let x=0; x<=130; x+=10) {
    const sx = sv(x,0).x;
    gridX.push(<g key={x}>
      <line x1={sx} y1={60} x2={sx} y2={OY} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
      {x>0&&<text x={sx} y={OY+18} fill="rgba(255,255,255,0.2)" fontSize="10" textAnchor="middle" fontFamily="Space Grotesk">{x}m</text>}
    </g>);
  }
  for (let y=0; y<=30; y+=5) {
    const sy = sv(0,y).y;
    gridY.push(<g key={y}>
      <line x1={60} y1={sy} x2={VW-30} y2={sy} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
      {y>0&&<text x={56} y={sy+4} fill="rgba(255,255,255,0.2)" fontSize="10" textAnchor="end" fontFamily="Space Grotesk">{y}m</text>}
    </g>);
  }

  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${VW} ${VH}`} style={{display:'block',background:'#060604'}}>
      {/* Ambient glow at origin */}


      {/* Grid */}
      {gridX}{gridY}

      {/* Ground */}
      <line x1={OX} y1={OY} x2={VW-30} y2={OY} stroke="rgba(255,255,255,0.12)" strokeWidth="1.5"/>
      {/* Y axis */}
      <line x1={OX} y1={70} x2={OX} y2={OY} stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>

      {/* Ghost arc */}
      <path d={ghostD} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="1.5" strokeDasharray="4,4"/>

      {/* Trajectory — clean diagram line */}
      {pathD && <path d={pathD} fill="none" stroke="rgba(255,255,255,0.7)" strokeWidth="1.5" strokeLinecap="round"/>}

      {/* Range marker */}
      <line x1={landSV.x} y1={OY-4} x2={landSV.x} y2={OY+8} stroke="rgba(255,255,255,0.5)" strokeWidth="1.5"/>
      <text x={landSV.x} y={OY+22} fill="rgba(255,255,255,0.45)" fontSize="11" textAnchor="middle" fontFamily="DM Mono">
        R = {arc.range.toFixed(1)} m
      </text>

      {/* Apex drop line */}
      <line x1={apSV.x} y1={apSV.y} x2={apSV.x} y2={OY} stroke="rgba(255,255,255,0.07)" strokeWidth="1" strokeDasharray="3,3"/>

      {/* Annotation at apex */}
      {showAnnotation && trailFrac >= 1 && (
        <g style={{animation:'fadeIn 0.5s ease forwards'}}>
          <line x1={apSV.x} y1={apSV.y-10} x2={apSV.x+30} y2={apSV.y-52} stroke="var(--amb)" strokeWidth="1.5" strokeDasharray="3,2" strokeOpacity="0.8"/>
          <rect x={apSV.x+28} y={apSV.y-68} width={208} height={28} rx="4"
            fill="rgba(20,16,0,0.85)" stroke="var(--amb)" strokeWidth="1.5" strokeOpacity="0.7"/>
          <text x={apSV.x+132} y={apSV.y-49} fill="var(--amb)" fontSize="12" textAnchor="middle" fontFamily="DM Mono">
            What are the velocity components here?
          </text>
          <circle cx={apSV.x} cy={apSV.y} r="5" fill="none" stroke="var(--amb)" strokeWidth="1.5" strokeOpacity="0.8"/>
          <circle cx={apSV.x} cy={apSV.y} r="10" fill="var(--amb)" fillOpacity="0.08"/>
        </g>
      )}

      {/* Landing annotation */}
      {showAnnotation && trailFrac >= 1 && (
        <g style={{animation:'fadeIn 0.5s ease 0.3s forwards', opacity:0}}>
          <rect x={landSV.x-56} y={OY+28} width={112} height={24} rx="4"
            fill="rgba(20,16,0,0.85)" stroke="var(--amb)" strokeWidth="1" strokeOpacity="0.5"/>
          <text x={landSV.x} y={OY+44} fill="var(--amb)" fontSize="11" textAnchor="middle" fontFamily="DM Mono">Peak range. Why 45°?</text>
        </g>
      )}

      {/* Cannon body */}
      <g transform={`translate(${OX},${OY})`}>
        <circle r="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5"/>
        <rect x="-5" y="-4" width="22" height="8" rx="3"
          fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" strokeWidth="1.5"
          transform={`rotate(-${angle})`}/>
      </g>

      {/* Ball — solid, no bloom */}
      {ballFrac > 0 && <circle cx={bsv.x} cy={bsv.y} r="5" fill="var(--acc)"/>}

      {/* Live readouts */}
      <text x={VW-16} y={80} fill="rgba(255,255,255,0.25)" fontSize="11" textAnchor="end" fontFamily="DM Mono">
        θ = {angle}° · v₀ = {velocity} m/s · g = 9.8 m/s²
      </text>
      <text x={VW-16} y={96} fill="rgba(255,255,255,0.18)" fontSize="11" textAnchor="end" fontFamily="DM Mono">
        H_max = {arc.maxH.toFixed(1)} m · T = {arc.T.toFixed(2)} s
      </text>
    </svg>
  );
}

// ── ParamPanel ────────────────────────────────────────────────────────────────
function ParamPanel({ angle, velocity, onAngle, onVelocity, highlightAngle }) {
  return (
    <div style={{
      position:'absolute', left:16, top:56, width:220,
      background:'rgba(8,8,6,0.82)', backdropFilter:'blur(16px)',
      border:`1px solid rgba(255,255,255,${highlightAngle?0.18:0.08})`,
      borderRadius:8, padding:'14px 16px', display:'flex', flexDirection:'column', gap:16,
      boxShadow: highlightAngle ? '0 0 0 1px var(--acc-g), 0 8px 32px rgba(0,0,0,0.5)' : '0 8px 32px rgba(0,0,0,0.5)'
    }}>
      <div style={{fontSize:11, fontFamily:'var(--fm)', color:'var(--txt3)', letterSpacing:'0.08em', textTransform:'uppercase'}}>
        parameters
      </div>

      {/* Launch Angle */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{
            fontSize:12, fontWeight:500, color: highlightAngle ? 'var(--acc)' : 'var(--txt2)',
            fontFamily:'var(--fu)', transition:'color 0.3s'
          }}>Launch Angle</span>
          <span style={{
            fontSize:13, fontFamily:'var(--fm)',
            color: highlightAngle ? 'var(--acc)' : 'var(--txt)',
            background: highlightAngle ? 'var(--acc-d)' : 'transparent',
            padding:'1px 6px', borderRadius:3, transition:'all 0.3s'
          }}>{angle}°</span>
        </div>
        <div style={{position:'relative', height:18, display:'flex', alignItems:'center'}}>
          <div style={{
            position:'absolute', left:0, right:0, height:2,
            background:`linear-gradient(to right, var(--acc) ${(angle/90)*100}%, rgba(255,255,255,0.1) ${(angle/90)*100}%)`,
            borderRadius:2,
            boxShadow: highlightAngle ? '0 0 8px var(--acc-g)' : 'none',
            transition:'box-shadow 0.3s'
          }}/>
          <input type="range" min="1" max="89" value={angle} onChange={e=>onAngle(+e.target.value)}
            style={{position:'absolute',left:0,right:0,width:'100%',opacity:0,cursor:'pointer',height:18,zIndex:2}}/>
          <div style={{
            position:'absolute', left:`calc(${(angle/90)*100}% - 7px)`,
            width:14, height:14, borderRadius:'50%',
            background: highlightAngle ? 'var(--acc)' : 'var(--txt)',
            border:`2px solid ${highlightAngle ? 'var(--acc)' : 'rgba(255,255,255,0.3)'}`,
            boxShadow: highlightAngle ? '0 0 0 4px var(--acc-g)' : 'none',
            transition:'all 0.3s', pointerEvents:'none'
          }}/>
        </div>
      </div>

      {/* Velocity */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:500,color:'var(--txt2)',fontFamily:'var(--fu)'}}>Velocity</span>
          <span style={{fontSize:13,fontFamily:'var(--fm)',color:'var(--txt)'}}>{velocity} m/s</span>
        </div>
        <div style={{position:'relative',height:18,display:'flex',alignItems:'center'}}>
          <div style={{
            position:'absolute',left:0,right:0,height:2,
            background:`linear-gradient(to right, rgba(255,255,255,0.5) ${((velocity-5)/55)*100}%, rgba(255,255,255,0.1) ${((velocity-5)/55)*100}%)`,
            borderRadius:2
          }}/>
          <input type="range" min="5" max="60" value={velocity} onChange={e=>onVelocity(+e.target.value)}
            style={{position:'absolute',left:0,right:0,width:'100%',opacity:0,cursor:'pointer',height:18,zIndex:2}}/>
          <div style={{
            position:'absolute',left:`calc(${((velocity-5)/55)*100}% - 7px)`,
            width:14,height:14,borderRadius:'50%',
            background:'var(--txt)',border:'2px solid rgba(255,255,255,0.3)',
            pointerEvents:'none'
          }}/>
        </div>
      </div>

      {/* Gravity — locked */}
      <div style={{opacity:0.32}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:500,color:'var(--txt2)',fontFamily:'var(--fu)',display:'flex',alignItems:'center',gap:5}}>
            <svg width="10" height="12" viewBox="0 0 10 12" fill="none" style={{opacity:0.7}}>
              <rect x="1" y="5" width="8" height="7" rx="1.5" stroke="currentColor" strokeWidth="1.2"/>
              <path d="M3 5V3.5a2 2 0 0 1 4 0V5" stroke="currentColor" strokeWidth="1.2"/>
            </svg>
            Gravity
          </span>
          <span style={{fontSize:13,fontFamily:'var(--fm)',color:'var(--txt3)'}}>9.8 m/s²</span>
        </div>
        <div style={{height:2,background:'rgba(255,255,255,0.08)',borderRadius:2}}/>
        <div style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--txt3)',marginTop:5,textAlign:'center',letterSpacing:'0.05em'}}>
          locked by tutor
        </div>
      </div>
    </div>
  );
}

// ── TutorStrip ────────────────────────────────────────────────────────────────
const tutorMessages = [
  { q: "Before you calculate anything — if you increase the angle from 30° to 60°, what do you predict happens to the range?", ev: null },
  { q: "What's happening to the horizontal component as you tilt further up?", ev: "param_changed launch_angle 30→60 · range: 34.3 m" },
  { q: "Now you're at 45°. Look at the range. What's special about this angle, geometrically?", ev: "param_changed launch_angle → 45 · range: 91.8 m (↑ max)" },
  { q: "Cut gravity in half — same angle, same velocity. What changes?", ev: "checkpoint restored · unlock gravity" },
];

function TutorStrip({ speaking, listening, msgIdx }) {
  const msg = tutorMessages[msgIdx % tutorMessages.length];
  const [inputVal, setInputVal] = useState('');
  return (
    <div style={{
      height:80, display:'flex', alignItems:'stretch',
      background:'var(--bg2)', borderTop:'1px solid var(--bdr2)',
      flexShrink:0
    }}>
      {/* Waveform section */}
      <div style={{
        width:180, borderRight:'1px solid var(--bdr)',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4, padding:'0 16px'
      }}>
        <div style={{fontSize:10, fontFamily:'var(--fm)', color: speaking ? 'var(--acc)' : 'var(--txt3)', letterSpacing:'0.06em', textTransform:'uppercase', transition:'color 0.3s'}}>
          {speaking ? '● tutor speaking' : listening ? '● listening' : '○ idle'}
        </div>
        <Waveform speaking={speaking} listening={listening} height={28}/>
        <div style={{fontSize:9, fontFamily:'var(--fm)', color:'var(--txt3)'}}>via ElevenLabs TTS</div>
      </div>

      {/* Question */}
      <div style={{flex:1, padding:'0 20px', display:'flex', flexDirection:'column', justifyContent:'center', gap:5}}>
        <div style={{fontSize:13.5, color:'var(--txt)', lineHeight:1.45, fontWeight:400}}>
          {msg.q.split(/(\d+°|horizontal|vertical|range|45°|gravity|velocity)/g).map((part, i) =>
            /(\d+°|horizontal|vertical|range|45°|gravity|velocity)/.test(part)
              ? <span key={i} style={{color:'var(--acc)',fontWeight:600}}>{part}</span>
              : part
          )}
        </div>
        {msg.ev && (
          <div style={{fontSize:10, fontFamily:'var(--fm)', color:'var(--txt3)', letterSpacing:'0.03em'}}>
            ↳ {msg.ev}
          </div>
        )}
      </div>

      {/* Student input */}
      <div style={{
        width:200, borderLeft:'1px solid var(--bdr)', padding:'0 14px',
        display:'flex', flexDirection:'column', justifyContent:'center', gap:8
      }}>
        <div style={{
          display:'flex', alignItems:'center', gap:8,

      <div style={{marginTop:32, fontSize:11, fontFamily:'var(--fm)', color:'var(--txt3)'}}>

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing');
  const [concept, setConcept] = useState('');
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Tweaks messaging
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function handleTweakChange(newT) {
    setTweaks(newT);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: newT }, '*');
  }

  return (
    <div style={{height:'100vh',overflow:'hidden',position:'relative'}}>
      {screen === 'landing' && (
        <LandingScreen onSubmit={text => { setConcept(text); setScreen('loading'); }}/>
      )}
      {screen === 'loading' && (
        <LoadingScreen concept={concept} onDone={() => setScreen('workspace')}/>
      )}
      {screen === 'workspace' && (
        <WorkspaceScreen concept={concept} tweaks={tweaks}/>
      )}
      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} onChange={handleTweakChange}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
