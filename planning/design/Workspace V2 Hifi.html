<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praxio — Workspace V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --surface: #f9f9f9;
  --surface2: #f3f3f1;
  --border: #e6e6e4;
  --border-strong: #d0d0cc;
  --ink: #111110;
  --ink2: #555552;
  --ink3: #999994;
  --ink4: #c8c8c4;
  --accent: oklch(50% 0.14 232);
  --accent-mid: oklch(60% 0.12 232);
  --accent-light: oklch(96% 0.03 232);
  --accent-border: oklch(80% 0.07 232);
  --yellow: oklch(72% 0.14 82);
  --yellow-light: oklch(96% 0.04 82);
  --yellow-border: oklch(82% 0.10 82);
  --r: 6px; --r-sm: 4px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.05);
  --shadow-xl: 0 16px 40px rgba(0,0,0,0.12),0 4px 12px rgba(0,0,0,0.06);
}
html, body, #root { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased; }

/* waveform animation */
@keyframes wave { from { transform:scaleY(0.3); } to { transform:scaleY(1); } }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.8);} }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.96);} to{opacity:1;transform:scale(1);} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── Branch data ──────────────────────────────────────────────────────────────
const BRANCHES_DATA = [
  {
    id: 'main',
    name: 'main',
    checkpoints: [
      { id: 'cp1', label: 'initial scene', ts: '10:02' },
      { id: 'cp2', label: 'gravity locked', ts: '10:08' },
      { id: 'cp3', label: 'student at 45°', ts: '10:14', current: true },
    ]
  },
  {
    id: 'no-gravity',
    name: 'no-gravity',
    checkpoints: [
      { id: 'cp1', label: 'g = 0 perturbation', ts: '10:11' },
    ]
  },
  {
    id: '45-focus',
    name: '45° focus',
    checkpoints: [
      { id: 'cp1', label: 'angle sweep start', ts: '10:16' },
      { id: 'cp2', label: 'peak range found', ts: '10:19' },
    ]
  },
];

// ─── BranchDropdown ───────────────────────────────────────────────────────────
function BranchDropdown({ activeBranch, activeCheckpoint, onSelect, onClose, onNewBranch }) {
  const ref = useRef(null);

  useEffect(() => {
    function handle(e) {
      if (ref.current && !ref.current.contains(e.target)) onClose();
    }
    document.addEventListener('mousedown', handle);
    return () => document.removeEventListener('mousedown', handle);
  }, [onClose]);

  return (
    <div ref={ref} style={{
      position:'absolute', top:'calc(100% + 6px)', right:0,
      background:'white', border:'1px solid var(--border)',
      borderRadius:8, boxShadow:'var(--shadow-xl)',
      width:260, zIndex:200,
      animation:'scaleIn 0.15s ease',
      transformOrigin:'top right',
      overflow:'hidden',
    }}>
      {/* Header */}
      <div style={{
        padding:'10px 14px 8px', borderBottom:'1px solid var(--border)',
        display:'flex', alignItems:'center', justifyContent:'space-between'
      }}>
        <span style={{fontSize:11, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', color:'var(--ink3)', fontFamily:'DM Mono,monospace'}}>Branches</span>
        <button onClick={onNewBranch} style={{
          fontSize:11, color:'var(--accent)', background:'none', border:'none',
          cursor:'pointer', fontFamily:'DM Sans,sans-serif', fontWeight:500,
          display:'flex', alignItems:'center', gap:3,
          padding:'2px 6px', borderRadius:4,
          transition:'background 0.1s',
        }}
        onMouseEnter={e=>e.currentTarget.style.background='var(--accent-light)'}
        onMouseLeave={e=>e.currentTarget.style.background='none'}
        >
          + New branch
        </button>
      </div>

      {/* Branch list */}
      <div style={{maxHeight:320, overflowY:'auto'}}>
        {BRANCHES_DATA.map(branch => (
          <div key={branch.id}>
            {/* Branch row */}
            <div
              onClick={() => onSelect(branch.id, branch.checkpoints[branch.checkpoints.length-1].id)}
              style={{
                padding:'8px 14px 4px',
                display:'flex', alignItems:'center', gap:7,
                cursor:'pointer', userSelect:'none',
                background: activeBranch === branch.id ? 'var(--accent-light)' : 'transparent',
                borderLeft: activeBranch === branch.id ? '2px solid var(--accent)' : '2px solid transparent',
                transition:'background 0.1s',
              }}
              onMouseEnter={e=>{ if(activeBranch!==branch.id) e.currentTarget.style.background='var(--surface)'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background = activeBranch===branch.id?'var(--accent-light)':'transparent'; }}
            >
              <span style={{fontSize:11, color:'var(--accent)', flexShrink:0}}>◆</span>
              <span style={{fontSize:13, fontWeight: activeBranch===branch.id ? 500 : 400, color:'var(--ink)', flex:1}}>{branch.name}</span>
              {activeBranch === branch.id && (
                <span style={{fontSize:10, background:'var(--accent)', color:'white', borderRadius:10, padding:'1px 7px', fontWeight:500}}>active</span>
              )}
              <span style={{fontSize:11, color:'var(--ink3)', fontFamily:'DM Mono,monospace'}}>{branch.checkpoints.length} cp</span>
            </div>

            {/* Checkpoints */}
            {branch.checkpoints.map((cp, i) => {
              const isCurrent = activeBranch === branch.id && activeCheckpoint === cp.id;
              return (
                <div
                  key={cp.id}
                  onClick={() => { onSelect(branch.id, cp.id); onClose(); }}
                  style={{
                    padding:'5px 14px 5px 34px',
                    display:'flex', alignItems:'center', gap:8,
                    cursor:'pointer', userSelect:'none',
                    background: isCurrent ? 'oklch(97% 0.04 82)' : 'transparent',
                    borderBottom: i === branch.checkpoints.length-1 ? '1px solid var(--border)' : 'none',
                    transition:'background 0.1s',
                  }}
                  onMouseEnter={e=>{ if(!isCurrent) e.currentTarget.style.background='var(--surface)'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background=isCurrent?'oklch(97% 0.04 82)':'transparent'; }}
                >
                  <div style={{
                    width:8, height:8, borderRadius:'50%', flexShrink:0,
                    background: isCurrent ? 'var(--yellow)' : 'var(--border-strong)',
                    border:`1.5px solid ${isCurrent?'var(--yellow)':'var(--border-strong)'}`,
                  }}/>
                  <span style={{fontSize:12, color: isCurrent ? 'oklch(52% 0.12 82)' : 'var(--ink2)', flex:1}}>{cp.label}</span>
                  {isCurrent && <span style={{fontSize:10, color:'var(--yellow)', fontWeight:500}}>now</span>}
                  <span style={{fontSize:10, color:'var(--ink4)', fontFamily:'DM Mono,monospace'}}>{cp.ts}</span>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Footer hint */}
      <div style={{padding:'8px 14px', borderTop:'1px solid var(--border)', fontSize:10, color:'var(--ink4)', fontFamily:'DM Mono,monospace'}}>
        click checkpoint to restore · esc to close
      </div>
    </div>
  );
}

// ─── Waveform ─────────────────────────────────────────────────────────────────
function Waveform({ state }) {
  const heights = [8,16,22,12,18,22,10,20,14,22,8,16,12,20,6];
  const flatH   = [4,6,4,5,4,6,4,5,4,6,4,5,4,6,4];
  const color = state === 'listening' ? 'oklch(55% 0.15 30)' : 'var(--accent)';
  const active = state === 'tutor speaking' || state === 'listening';
  const bars = active ? heights : flatH;
  return (
    <div style={{display:'flex', alignItems:'center', gap:2.5, height:22}}>
      {bars.map((h,i) => (
        <div key={i} style={{
          width:2.5, borderRadius:2,
          background: active ? color : 'var(--ink4)',
          height: h,
          animation: active ? `wave ${0.6+i*0.05}s ease-in-out ${i*0.04}s infinite alternate` : 'none',
        }}/>
      ))}
    </div>
  );
}

// ─── SimControls ──────────────────────────────────────────────────────────────
function SimControls({ simPhase, onPhaseChange }) {
  const configs = {
    idle:    { label:'Launch',  icon: <polygon points="0,0 10,5 0,10" fill="white"/>, bg:'var(--accent)',  next:'active'  },
    active:  { label:'Pause',   icon: <><rect x="0" y="0" width="3.5" height="10" rx="1" fill="white"/><rect x="6.5" y="0" width="3.5" height="10" rx="1" fill="white"/></>, bg:'var(--ink)', next:'paused' },
    paused:  { label:'Play',    icon: <polygon points="0,0 10,5 0,10" fill="white"/>, bg:'var(--ink)',    next:'active'  },
    done:    { label:'Reset',   icon: <path d="M9 2A7 7 0 1 0 14 7" stroke="white" strokeWidth="1.8" fill="none" strokeLinecap="round"/>, bg:'var(--border-strong)', next:'idle' },
  };
  const cfg = configs[simPhase] || configs.active;
  return (
    <div style={{position:'absolute', right:16, bottom:14, zIndex:20, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5}}>
      <span style={{fontSize:10, fontWeight:500, color:'var(--ink4)', letterSpacing:'0.06em', textTransform:'uppercase', fontFamily:'DM Mono,monospace'}}>
        Sim · {simPhase}
      </span>
      <button
        onClick={() => onPhaseChange(cfg.next)}
        style={{
          display:'flex', alignItems:'center', gap:7,
          padding:'8px 18px', borderRadius:'var(--r-sm)',
          fontSize:13, fontWeight:500, cursor:'pointer',
          border:'none', outline:'none',
          fontFamily:'DM Sans,sans-serif',
          background: cfg.bg, color:'white',
          boxShadow:'var(--shadow-sm)',
          transition:'opacity 0.15s, transform 0.1s',
          letterSpacing:'-0.01em',
        }}
        onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
        onMouseLeave={e=>e.currentTarget.style.opacity='1'}
        onMouseDown={e=>e.currentTarget.style.transform='scale(0.97)'}
        onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
      >
        <svg width="10" height="10" viewBox="0 0 10 10">{cfg.icon}</svg>
        {cfg.label}
      </button>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "tutorState": "tutor speaking",
    "simPhase": "active",
    "conceptTitle": "projectile motion",
    "showSimHint": true,
    "showAnnotation": true
  }/*EDITMODE-END*/;

  const { tweaks: rawTweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const tweaks = rawTweaks || TWEAK_DEFAULTS;
  const [showTweaks, setShowTweaks] = useState(false);
  const [branchOpen, setBranchOpen] = useState(false);
  const [activeBranch, setActiveBranch] = useState('main');
  const [activeCheckpoint, setActiveCheckpoint] = useState('cp3');
  const [simPhase, setSimPhase] = useState(TWEAK_DEFAULTS.simPhase);

  // Keep simPhase synced when tweaks change
  useEffect(() => { setSimPhase(tweaks.simPhase); }, [tweaks.simPhase]);

  // Tweaks panel host protocol
  useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const branch = BRANCHES_DATA.find(b => b.id === activeBranch) || BRANCHES_DATA[0];
  const cpIndex = branch.checkpoints.findIndex(c => c.id === activeCheckpoint);
  const cpLabel = `cp ${cpIndex + 1}/${branch.checkpoints.length}`;

  const statusColors = {
    'tutor speaking': 'var(--accent)',
    'listening':      'oklch(55% 0.15 30)',
    'idle':           'var(--ink3)',
    'processing':     'oklch(68% 0.14 82)',
  };
  const statusColor = statusColors[tweaks.tutorState] || 'var(--ink3)';
  const statusDot = tweaks.tutorState !== 'idle' ? '●' : '○';

  return (
    <div style={{width:'100%', height:'100%', display:'flex', flexDirection:'column', overflow:'hidden'}}>

      {/* ── TopBar ── */}
      <div style={{
        height:44, flexShrink:0,
        background:'rgba(255,255,255,0.92)',
        backdropFilter:'blur(12px)',
        borderBottom:'1px solid var(--border)',
        display:'flex', alignItems:'center',
        padding:'0 16px', gap:10,
        zIndex:100, position:'relative',
      }}>
        {/* Logo */}
        <div style={{display:'flex', alignItems:'center', gap:7, flexShrink:0}}>
          <div style={{
            width:22, height:22, background:'var(--accent)',
            borderRadius:5, display:'flex', alignItems:'center', justifyContent:'center',
          }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 10 L6 2 L10 10" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              <path d="M3.5 7.5 L8.5 7.5" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <span style={{fontSize:14, fontWeight:600, color:'var(--ink)', letterSpacing:'-0.01em'}}>Praxio</span>
        </div>

        <div style={{width:1, height:18, background:'var(--border)', flexShrink:0}}/>

        {/* Concept title */}
        <div style={{fontSize:13, color:'var(--ink2)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0}}>
          {tweaks.conceptTitle}
        </div>

        {/* BranchPill — functional */}
        <div style={{position:'relative', flexShrink:0}}>
          <button
            onClick={() => setBranchOpen(o => !o)}
            style={{
              display:'flex', alignItems:'center', gap:5,
              background: branchOpen ? 'var(--accent-light)' : 'var(--surface)',
              border:`1px solid ${branchOpen ? 'var(--accent-border)' : 'var(--border)'}`,
              borderRadius:20, padding:'3px 10px 3px 8px',
              fontSize:12, fontWeight:500, color:'var(--ink2)',
              fontFamily:'DM Mono,monospace', cursor:'pointer',
              transition:'border-color 0.15s, background 0.15s',
              outline:'none',
            }}
          >
            <span style={{color:'var(--accent)', fontSize:9}}>◆</span>
            {branch.name} · {cpLabel}
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{opacity:0.4, transition:'transform 0.15s', transform: branchOpen?'rotate(180deg)':'none', marginLeft:1}}>
              <path d="M2 4 L5 7 L8 4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>

          {branchOpen && (
            <BranchDropdown
              activeBranch={activeBranch}
              activeCheckpoint={activeCheckpoint}
              onSelect={(bid, cid) => { setActiveBranch(bid); setActiveCheckpoint(cid); }}
              onClose={() => setBranchOpen(false)}
              onNewBranch={() => { setBranchOpen(false); }}
            />
          )}
        </div>

        {/* Avatar */}
        <div style={{
          width:26, height:26, borderRadius:'50%', flexShrink:0,
          background:'linear-gradient(135deg, oklch(75% 0.12 280), oklch(65% 0.14 240))',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:11, fontWeight:600, color:'white', cursor:'pointer',
        }}>JS</div>
      </div>

      {/* ── SimArea ── */}
      <div style={{flex:1, position:'relative', overflow:'hidden', background:'var(--bg)'}}>

        {/* Dot-grid background */}
        <div style={{
          position:'absolute', inset:0,
          background:'radial-gradient(circle, #d4d4cc 1px, transparent 1px)',
          backgroundSize:'24px 24px',
          backgroundColor:'#fafaf8',
        }}/>

        {/* Sim illustration */}
        <div style={{
          position:'absolute', left:'50%', top:'50%',
          transform:'translate(-40%, -50%)', opacity:0.22, pointerEvents:'none',
        }}>
          <svg width="560" height="280" viewBox="0 0 560 280" fill="none">
            <line x1="20" y1="240" x2="540" y2="240" stroke="#c8c8c0" strokeWidth="1.5"/>
            <path d="M 40 238 Q 220 30 400 238" stroke="#b0b0a8" strokeWidth="2" fill="none" strokeDasharray="6 4"/>
            <rect x="18" y="216" width="44" height="22" rx="3" fill="none" stroke="#b8b8b0" strokeWidth="1.5"/>
            <line x1="62" y1="225" x2="96" y2="206" stroke="#b8b8b0" strokeWidth="3" strokeLinecap="round"/>
            <circle cx="30" cy="240" r="7" fill="none" stroke="#b8b8b0" strokeWidth="1.5"/>
            <circle cx="52" cy="240" r="7" fill="none" stroke="#b8b8b0" strokeWidth="1.5"/>
            <path d="M 62 225 A 28 28 0 0 1 90 225" stroke="#b8b8b0" strokeWidth="1" fill="none"/>
            <text x="80" y="220" fontFamily="DM Mono" fontSize="10" fill="#c8c8c0">45°</text>
            <circle cx="400" cy="238" r="4" fill="none" stroke="#b8b8b0" strokeWidth="1.5"/>
            <line x1="400" y1="238" x2="400" y2="256" stroke="#b8b8b0" strokeWidth="1" strokeDasharray="3 2"/>
            <text x="386" y="268" fontFamily="DM Mono" fontSize="10" fill="#c8c8c0">range</text>
            <circle cx="220" cy="30" r="3" fill="#b8b8b0"/>
            <line x1="220" y1="30" x2="260" y2="30" stroke="#b8b8b0" strokeWidth="1.5" strokeLinecap="round"/>
            <polygon points="260,27 266,30 260,33" fill="#b8b8b0"/>
            <text x="222" y="22" fontFamily="DM Mono" fontSize="10" fill="#c8c8c0">vx</text>
          </svg>
        </div>

        {/* Highlight ring + annotation */}
        {tweaks.showAnnotation && (
          <>
            <div style={{
              position:'absolute',
              left:'calc(50% - 30px)', top:'calc(50% - 138px)',
              width:72, height:24,
              border:'1.5px solid var(--accent)', borderRadius:'var(--r-sm)',
              background:'var(--accent-light)', pointerEvents:'none',
            }}/>
            <div style={{position:'absolute', left:'calc(50% + 56px)', top:'calc(50% - 156px)', animation:'fadeIn 0.2s ease'}}>
              <div style={{
                background:'white', border:'1px solid var(--yellow-border)',
                borderRadius:6, padding:'6px 10px',
                fontSize:12, color:'var(--ink)', whiteSpace:'nowrap',
                boxShadow:'0 2px 8px rgba(0,0,0,0.08)', lineHeight:1.4,
              }}>
                What are the{' '}
                <strong style={{color:'var(--yellow)', fontWeight:600}}>velocity components</strong>{' '}
                here?
              </div>
              <div style={{width:1, height:20, background:'var(--yellow-border)', marginLeft:14}}/>
              <div style={{width:7, height:7, borderRadius:'50%', background:'var(--yellow)', marginLeft:10}}/>
            </div>
          </>
        )}

        {/* ParamPanel */}
        <div style={{
          position:'absolute', left:16, top:16, zIndex:20,
          background:'rgba(255,255,255,0.97)',
          border:'1px solid var(--border)',
          borderRadius:'var(--r)', boxShadow:'var(--shadow-lg)',
          minWidth:228, overflow:'hidden',
        }}>
          <div style={{
            padding:'8px 12px', borderBottom:'1px solid var(--border)',
            fontSize:10, fontWeight:600, letterSpacing:'0.08em',
            textTransform:'uppercase', color:'var(--ink3)',
            fontFamily:'DM Mono,monospace',
          }}>Parameters</div>

          {/* Launch Angle — highlighted */}
          <div style={{
            display:'flex', alignItems:'center', gap:10, padding:'9px 12px',
            background:'var(--accent-light)', position:'relative',
          }}>
            <div style={{position:'absolute', left:0, top:0, bottom:0, width:2, background:'var(--accent)', borderRadius:'0 1px 1px 0'}}/>
            <span style={{fontSize:12, fontWeight:500, color:'var(--accent)', minWidth:90}}>Launch Angle</span>
            <div style={{flex:1, position:'relative', height:4, background:'var(--surface2)', borderRadius:2, cursor:'pointer'}}>
              <div style={{position:'absolute', left:0, top:0, height:4, width:'45%', background:'var(--accent)', borderRadius:2}}/>
              <div style={{position:'absolute', top:-5, left:'45%', width:14, height:14, background:'white', border:'2px solid var(--accent)', borderRadius:'50%', transform:'translateX(-7px)', boxShadow:'var(--shadow-sm)'}}/>
            </div>
            <span style={{fontSize:11, fontWeight:500, color:'var(--ink3)', fontFamily:'DM Mono,monospace', minWidth:32, textAlign:'right'}}>45°</span>
          </div>

          {/* Velocity */}
          <div style={{display:'flex', alignItems:'center', gap:10, padding:'9px 12px'}}>
            <span style={{fontSize:12, fontWeight:500, color:'var(--ink2)', minWidth:90}}>Velocity</span>
            <div style={{flex:1, position:'relative', height:4, background:'var(--surface2)', borderRadius:2, cursor:'pointer'}}>
              <div style={{position:'absolute', left:0, top:0, height:4, width:'60%', background:'var(--accent)', borderRadius:2}}/>
              <div style={{position:'absolute', top:-5, left:'60%', width:14, height:14, background:'white', border:'2px solid var(--accent)', borderRadius:'50%', transform:'translateX(-7px)', boxShadow:'var(--shadow-sm)'}}/>
            </div>
            <span style={{fontSize:11, fontWeight:500, color:'var(--ink3)', fontFamily:'DM Mono,monospace', minWidth:32, textAlign:'right'}}>30 m/s</span>
          </div>

          {/* Gravity — locked */}
          <div style={{display:'flex', alignItems:'center', gap:10, padding:'9px 12px', opacity:0.45}}>
            <span style={{fontSize:12, fontWeight:500, color:'var(--ink2)', minWidth:90, display:'flex', alignItems:'center', gap:5}}>
              <svg width="10" height="12" viewBox="0 0 10 12" fill="none">
                <rect x="1" y="5" width="8" height="7" rx="1.5" stroke="currentColor" strokeWidth="1.3"/>
                <path d="M3 5V3.5a2 2 0 1 1 4 0V5" stroke="currentColor" strokeWidth="1.3"/>
              </svg>
              Gravity
            </span>
            <div style={{flex:1, position:'relative', height:4, background:'var(--surface2)', borderRadius:2}}>
              <div style={{position:'absolute', left:0, top:0, height:4, width:'50%', background:'var(--border-strong)', borderRadius:2}}/>
              <div style={{position:'absolute', top:-5, left:'50%', width:14, height:14, background:'white', border:'2px solid var(--border-strong)', borderRadius:'50%', transform:'translateX(-7px)', boxShadow:'var(--shadow-sm)'}}/>
            </div>
            <span style={{fontSize:11, fontWeight:500, color:'var(--ink3)', fontFamily:'DM Mono,monospace', minWidth:36, textAlign:'right'}}>9.8 m/s²</span>
          </div>

          <div style={{
            padding:'6px 12px', borderTop:'1px solid var(--border)',
            fontSize:10, color:'var(--accent-mid)', fontFamily:'DM Mono,monospace',
            display:'flex', alignItems:'center', gap:4,
          }}>↑ highlight("launch_angle")</div>
        </div>

        {/* SimControls */}
        <SimControls simPhase={simPhase} onPhaseChange={p => { setSimPhase(p); setTweak('simPhase', p); }} />
      </div>

      {/* ── TutorStrip ── */}
      <div style={{
        height:80, flexShrink:0,
        background:'white', borderTop:'1px solid var(--border)',
        display:'flex', alignItems:'stretch',
        zIndex:100,
      }}>
        {/* Left: 180px — status + waveform */}
        <div style={{
          width:180, flexShrink:0,
          borderRight:'1px solid var(--border)',
          display:'flex', flexDirection:'column',
          justifyContent:'center', padding:'0 16px', gap:6,
        }}>
          <div style={{fontSize:11, fontWeight:500, color:statusColor, display:'flex', alignItems:'center', gap:5, fontFamily:'DM Mono,monospace'}}>
            {tweaks.tutorState !== 'idle' && tweaks.tutorState !== 'processing'
              ? <div style={{width:6, height:6, borderRadius:'50%', background:statusColor, animation:'pulse 1.6s ease-in-out infinite', flexShrink:0}}/>
              : tweaks.tutorState === 'processing'
              ? <div style={{width:10, height:10, border:`1.5px solid ${statusColor}`, borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.8s linear infinite', flexShrink:0}}/>
              : <div style={{width:6, height:6, borderRadius:'50%', border:`1.5px solid ${statusColor}`, flexShrink:0}}/>
            }
            {tweaks.tutorState}
          </div>
          <Waveform state={tweaks.tutorState} />
        </div>

        {/* Center: flex — question + sim hint */}
        <div style={{flex:1, padding:'0 20px', display:'flex', flexDirection:'column', justifyContent:'center', gap:3, minWidth:0}}>
          <div style={{fontSize:14, fontWeight:400, color:'var(--ink)', lineHeight:1.45, letterSpacing:'-0.01em'}}>
            "What's happening to the{' '}
            <span style={{color:'var(--accent)', fontWeight:500}}>horizontal component</span>
            {' '}as you tilt the angle further up?"
          </div>
          {tweaks.showSimHint && (
            <div style={{fontSize:11, color:'var(--ink3)', fontFamily:'DM Mono,monospace', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
              ↳ param_changed: launch_angle 30→60 · range 56m → 34m
            </div>
          )}
        </div>

        {/* Right: 200px — input + speak */}
        <div style={{width:200, flexShrink:0, borderLeft:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 12px', gap:8}}>
          <input
            style={{
              flex:1, height:34,
              background:'var(--surface)', border:'1px solid var(--border)',
              borderRadius:'var(--r-sm)', padding:'0 10px',
              fontSize:12, fontFamily:'DM Sans,sans-serif', color:'var(--ink)',
              outline:'none', transition:'border-color 0.15s, background 0.15s',
            }}
            placeholder="type reply…"
            onFocus={e=>{ e.target.style.borderColor='var(--accent-border)'; e.target.style.background='white'; }}
            onBlur={e=>{ e.target.style.borderColor='var(--border)'; e.target.style.background='var(--surface)'; }}
          />
          <button
            style={{
              width:34, height:34, background:'var(--ink)', borderRadius:'var(--r-sm)',
              border:'none', cursor:'pointer', flexShrink:0,
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'background 0.15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='#333'}
            onMouseLeave={e=>e.currentTarget.style.background='var(--ink)'}
            title="Speak (STT)"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
          </button>
        </div>
      </div>

      {/* ── Tweaks Panel ── */}
      {showTweaks && (
        <TweaksPanel onClose={() => {
          setShowTweaks(false);
          window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
        }}>
          <TweakSection label="Tutor Strip">
            <TweakRadio
              label="Status state"
              value={tweaks.tutorState}
              options={['tutor speaking','listening','idle','processing']}
              onChange={v => setTweak('tutorState', v)}
            />
            <TweakToggle label="Show sim event hint" value={tweaks.showSimHint} onChange={v => setTweak('showSimHint', v)} />
          </TweakSection>
          <TweakSection label="Simulation">
            <TweakRadio
              label="Sim phase"
              value={simPhase}
              options={['idle','active','paused','done']}
              onChange={v => { setSimPhase(v); setTweak('simPhase', v); }}
            />
            <TweakToggle label="Show annotation overlay" value={tweaks.showAnnotation} onChange={v => setTweak('showAnnotation', v)} />
          </TweakSection>
          <TweakSection label="Content">
            <TweakText label="Concept title" value={tweaks.conceptTitle} onChange={v => setTweak('conceptTitle', v)} />
          </TweakSection>
        </TweaksPanel>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
