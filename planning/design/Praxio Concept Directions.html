<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;font-family:'JetBrains Mono',monospace;}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;width:100%;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:0;height:0;}
input[type=range]::-webkit-slider-runnable-track{background:transparent;height:1px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Monochrome tokens ────────────────────────────────────────────────────────
const M = {
  bg: '#1a1a1a', bg2: '#1d1d1d', bg3: '#212121',
  bdr: '#2d2d2d', bdr2: '#383838',
  txt: '#d5d2cc', txt2: '#6a6a6a', txt3: '#3e3e3e',
  fn: '"JetBrains Mono", monospace',
};

// ── Themes ───────────────────────────────────────────────────────────────────
const THEMES = [
  {
    id: 'steel-lilac',
    label: 'Steel → Lilac',
    gradient: 'linear-gradient(135deg, oklch(60% 0.03 280), oklch(72% 0.12 290))',
    gradientSm: 'linear-gradient(135deg, oklch(60% 0.03 280), oklch(68% 0.10 290))',
    note: 'light hitting metal · blooms into soft purple',
    dotColor: 'oklch(68% 0.10 290)',
  },
  {
    id: 'copper-sand',
    label: 'Copper → Sand',
    gradient: 'linear-gradient(135deg, oklch(65% 0.12 55), oklch(78% 0.05 75))',
    gradientSm: 'linear-gradient(135deg, oklch(62% 0.10 55), oklch(76% 0.04 75))',
    note: 'patinated brass · old observatory · nobody in edtech',
    dotColor: 'oklch(65% 0.12 55)',
  },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function GT({ children, gradient, style={} }) {
  return (
    <span style={{
      background: gradient, WebkitBackgroundClip:'text',
      WebkitTextFillColor:'transparent', backgroundClip:'text', ...style
    }}>{children}</span>
  );
}

function GradientBorder({ gradient, children, radius=2, thickness=1 }) {
  return (
    <div style={{background:gradient,padding:thickness,borderRadius:radius+thickness,display:'inline-flex'}}>
      <div style={{background:M.bg2,borderRadius:radius,width:'100%'}}>{children}</div>
    </div>
  );
}

// ── LogoMark ──────────────────────────────────────────────────────────────────
function LogoMark({ size=20 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <rect x="3" y="3" width="15" height="15" rx="4"
        stroke="rgba(200,200,200,0.22)" strokeWidth="1.5" transform="rotate(-14 10.5 10.5)"/>
      <rect x="3" y="3" width="15" height="15" rx="4"
        stroke="rgba(200,200,200,0.68)" strokeWidth="1.5" transform="rotate(8 10.5 10.5)"/>
      <circle cx="10.5" cy="10.5" r="2" fill="rgba(200,200,200,0.75)"/>
    </svg>
  );
}

function Wordmark({ gradient, size=13 }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:5}}>
      <LogoMark size={size+5}/>
      <span style={{fontFamily:M.fn,fontWeight:600,fontSize:size,letterSpacing:'-0.02em',color:M.txt}}>
        Pra<GT gradient={gradient}>x</GT>io
      </span>
    </div>
  );
}

// ── Physics ───────────────────────────────────────────────────────────────────
function computeArc(deg, v0, g=9.8, steps=80) {
  const a = deg*Math.PI/180, T = 2*v0*Math.sin(a)/g;
  const pts = Array.from({length:steps+1},(_,i)=>{
    const t=(i/steps)*T;
    return {x:v0*Math.cos(a)*t, y:v0*Math.sin(a)*t-0.5*g*t*t};
  });
  return {pts,T,range:v0**2*Math.sin(2*a)/g,maxH:(v0*Math.sin(a))**2/(2*g),
    apex:{x:v0**2*Math.sin(2*a)/(2*g),y:(v0*Math.sin(a))**2/(2*g)}};
}

// ── SimCanvas ────────────────────────────────────────────────────────────────
function SimCanvas({ angle, velocity, showAnnotation, width, height, uid }) {
  const OX=72, OY=height-48, SC=(width-110)/110;
  const sv = (px,py) => ({x:OX+px*SC, y:OY-py*SC});

  const arc = computeArc(angle, velocity);
  const rafRef=useRef(null), startRef=useRef(null);
  const [bf, setBf] = useState(0);
  const [tf, setTf] = useState(0);

  useEffect(()=>{
    startRef.current=null; setBf(0); setTf(0);
    const dur=Math.max(arc.T*950,1800), td=480;
    function tick(ts){
      if(!startRef.current) startRef.current=ts;
      const el=ts-startRef.current;
      setTf(Math.min(el/td,1)); setBf(Math.min(el/dur,1));
      if(el/dur<1){ rafRef.current=requestAnimationFrame(tick); }
      else{ setTimeout(()=>{startRef.current=null;rafRef.current=requestAnimationFrame(tick);},1400); }
    }
    rafRef.current=requestAnimationFrame(tick);
    return ()=>{ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  },[angle,velocity]);

  const vn=Math.max(2,Math.round(tf*arc.pts.length));
  const pathD=arc.pts.slice(0,vn).map((p,i)=>{const{x,y}=sv(p.x,p.y);return`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`;}).join('');
  const ghostD=arc.pts.map((p,i)=>{const{x,y}=sv(p.x,p.y);return`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`;}).join('');
  const bi=Math.round(bf*(arc.pts.length-1));
  const bp=arc.pts[bi]||arc.pts[arc.pts.length-1];
  const bsv=sv(bp.x,bp.y), apSV=sv(arc.apex.x,arc.apex.y), laSV=sv(arc.range,0);

  const xTicks=[20,40,60,80,100].map(x=>({x:sv(x,0).x,l:`${x}`}));
  const yTicks=[5,10,15,20].map(y=>({y:sv(0,y).y,l:`${y}`}));

  return (
    <svg width={width} height={height} style={{display:'block',background:M.bg}}>
      <defs>
        <pattern id={`dg-${uid}`} x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
          <circle cx="0" cy="0" r="0.8" fill="rgba(255,255,255,0.09)"/>
        </pattern>
      </defs>
      <rect width={width} height={height} fill={`url(#dg-${uid})`}/>

      {/* Axes */}
      <line x1={OX} y1={OY} x2={width-16} y2={OY} stroke={M.bdr2} strokeWidth="1"/>
      <line x1={OX} y1={40} x2={OX} y2={OY} stroke={M.bdr2} strokeWidth="1"/>

      {/* Ticks */}
      {xTicks.map(({x,l})=>(
        <g key={l}>
          <line x1={x} y1={OY} x2={x} y2={OY+4} stroke={M.txt3} strokeWidth="1"/>
          <text x={x} y={OY+13} fill={M.txt3} fontSize="9" textAnchor="middle" fontFamily={M.fn}>{l}m</text>
        </g>
      ))}
      {yTicks.map(({y,l})=>(
        <g key={l}>
          <line x1={OX-4} y1={y} x2={OX} y2={y} stroke={M.txt3} strokeWidth="1"/>
          <text x={OX-7} y={y+3} fill={M.txt3} fontSize="9" textAnchor="end" fontFamily={M.fn}>{l}m</text>
        </g>
      ))}

      {/* Ghost */}
      <path d={ghostD} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
      {/* Arc */}
      {pathD && <path d={pathD} fill="none" stroke="rgba(255,255,255,0.72)" strokeWidth="1.5" strokeLinecap="round"/>}

      {/* Apex guide */}
      <line x1={apSV.x} y1={apSV.y} x2={apSV.x} y2={OY} stroke={M.txt3} strokeWidth="1" strokeDasharray="2,3"/>
      {/* Range marker */}
      <line x1={laSV.x} y1={OY-3} x2={laSV.x} y2={OY+5} stroke={M.txt2} strokeWidth="1"/>
      <text x={laSV.x} y={OY+15} fill={M.txt2} fontSize="9" textAnchor="middle" fontFamily={M.fn}>R={arc.range.toFixed(1)}m</text>

      {/* Annotations — straight line, plain text */}
      {showAnnotation && tf>=1 && (
        <g>
          <line x1={apSV.x} y1={apSV.y-3} x2={apSV.x+50} y2={apSV.y-48} stroke="rgba(255,255,255,0.25)" strokeWidth="1"/>
          <circle cx={apSV.x} cy={apSV.y} r="2.5" fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="1"/>
          <text x={apSV.x+54} y={apSV.y-50} fill="rgba(255,255,255,0.5)" fontSize="10" fontFamily={M.fn}>velocity components?</text>
        </g>
      )}
      {showAnnotation && tf>=1 && (
        <g style={{animation:'fadeIn 0.4s 0.3s both',opacity:0}}>
          <line x1={laSV.x} y1={OY-4} x2={laSV.x-4} y2={OY-22} stroke="rgba(255,255,255,0.18)" strokeWidth="1"/>
          <text x={laSV.x-8} y={OY-24} fill="rgba(255,255,255,0.35)" fontSize="10" fontFamily={M.fn} textAnchor="end">peak range — why 45°?</text>
        </g>
      )}

      {/* Cannon */}
      <rect x={OX-3} y={OY-4} width={14} height={8} rx="2"
        fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.32)" strokeWidth="1"
        transform={`rotate(-${angle} ${OX} ${OY})`}/>
      <circle cx={OX} cy={OY} r="4" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.45)" strokeWidth="1"/>

      {/* Ball */}
      {bf>0 && <circle cx={bsv.x} cy={bsv.y} r="4" fill="rgba(255,255,255,0.82)"/>}

      {/* Readouts */}
      <text x={width-10} y={16} fill={M.txt3} fontSize="9" textAnchor="end" fontFamily={M.fn}>θ={angle}°  v₀={velocity}m/s  g=9.8m/s²</text>
      <text x={width-10} y={28} fill={M.txt3} fontSize="9" textAnchor="end" fontFamily={M.fn}>H={arc.maxH.toFixed(1)}m  T={arc.T.toFixed(2)}s  R={arc.range.toFixed(1)}m</text>
    </svg>
  );
}

// ── ParamPanel ────────────────────────────────────────────────────────────────
function ParamPanel({ angle, velocity, onAngle, onVelocity, theme }) {
  const items = [
    {k:'launch_angle', val:`${angle}°`,   min:1, max:89, v:angle,    set:onAngle,    pct:(angle-1)/88,    active:true  },
    {k:'velocity',     val:`${velocity}m/s`, min:5, max:60, v:velocity, set:onVelocity, pct:(velocity-5)/55, active:false },
    {k:'gravity',      val:'9.8 m/s²',    locked:true },
  ];
  return (
    <div style={{
      position:'absolute',left:10,top:10,width:200,
      background:M.bg,border:`1px solid ${M.bdr}`,borderRadius:3,
      padding:'10px 12px',display:'flex',flexDirection:'column',gap:14,
    }}>
      <span style={{fontSize:9,color:M.txt3,letterSpacing:'0.1em',textTransform:'uppercase'}}>parameters</span>
      {items.map(p=>(
        <div key={p.k} style={{opacity:p.locked?0.32:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:7}}>
            <span style={{fontSize:10,color:p.active?M.txt:M.txt2,fontFamily:M.fn}}>
              {p.locked&&<span style={{marginRight:4,fontSize:9}}>⊘</span>}{p.k}
            </span>
            <span style={{fontSize:10,fontFamily:M.fn,color:p.active?M.txt:M.txt2}}>
              {p.locked ? <GT gradient={theme.gradientSm}>{p.val}</GT> : p.val}
            </span>
          </div>
          {!p.locked&&(
            <div style={{position:'relative',height:14,display:'flex',alignItems:'center'}}>
              <div style={{position:'absolute',left:0,right:0,height:1,background:M.bdr2}}/>
              <input type="range" min={p.min} max={p.max} value={p.v}
                onChange={e=>p.set(+e.target.value)}
                style={{position:'absolute',left:0,width:'100%',opacity:0,height:14,zIndex:2,cursor:'pointer'}}/>
              <div style={{
                position:'absolute',left:`calc(${p.pct*100}% - 6px)`,
                width:12,height:12,borderRadius:'50%',pointerEvents:'none',
                background:p.active?theme.gradientSm:'rgba(160,160,160,0.55)',
                border:`1px solid ${p.active?'rgba(255,255,255,0.2)':M.bdr2}`,zIndex:1,
              }}/>
              {p.active&&<div style={{
                position:'absolute',left:`calc(${p.pct*100}% - 9px)`,
                width:18,height:18,borderRadius:'50%',pointerEvents:'none',
                border:'1px solid rgba(255,255,255,0.12)',
              }}/>}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── TopBar ────────────────────────────────────────────────────────────────────
function TopBar({ theme, width }) {
  return (
    <div style={{
      height:38,width,display:'flex',alignItems:'center',
      padding:'0 14px',gap:10,background:M.bg2,
      borderBottom:`1px solid ${M.bdr}`,flexShrink:0,
    }}>
      <Wordmark gradient={theme.gradient} size={13}/>
      <div style={{width:1,height:14,background:M.bdr}}/>
      <span style={{fontSize:10,color:M.txt2,fontFamily:M.fn,flex:1,
        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        why does launch angle affect projectile range?
      </span>
      <span style={{fontSize:9,color:M.txt3,fontFamily:M.fn,
        border:`1px solid ${M.bdr}`,borderRadius:2,padding:'2px 8px'}}>
        main · cp 2/3
      </span>
    </div>
  );
}

// ── TutorStrip ────────────────────────────────────────────────────────────────
const MSGS = [
  {q:"Before you calculate anything — if you increase the angle from 30 to 60°, what do you predict happens to the range?", ev:null, state:'speaking'},
  {q:"What's happening to the horizontal component as you tilt further up?", ev:"param_changed  launch_angle  30→60  range: 34.3m", state:'idle'},
  {q:"You're at 45°. What's geometrically special about this angle?", ev:"param_changed  launch_angle → 45  range: 91.8m  ↑ max", state:'speaking'},
  {q:"Cut gravity in half — same angle, same velocity. What changes?", ev:"checkpoint_restored  gravity_unlocked", state:'idle'},
];

function TutorStrip({ theme, msgIdx, onNext, width }) {
  const msg = MSGS[msgIdx%MSGS.length];
  const speaking = msg.state==='speaking';
  const [input, setInput] = useState('');

  return (
    <div style={{
      height:72,display:'flex',alignItems:'stretch',
      background:M.bg2,borderTop:`1px solid ${M.bdr}`,
      flexShrink:0,width,overflow:'hidden',
    }}>
      {/* Gradient left bar */}
      <div style={{width:3,background:theme.gradient,flexShrink:0}}/>

      {/* Tutor status column */}
      <div style={{
        width:128,borderRight:`1px solid ${M.bdr}`,
        display:'flex',flexDirection:'column',justifyContent:'center',
        padding:'0 12px',gap:5,flexShrink:0,
      }}>
        <span style={{fontSize:9,color:M.txt3,letterSpacing:'0.08em',textTransform:'uppercase'}}>tutor</span>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <div style={{
            width:6,height:6,borderRadius:'50%',flexShrink:0,
            background: speaking ? theme.dotColor : M.txt3,
            transition:'background 0.4s',
          }}/>
          <span style={{fontSize:10,color:speaking?M.txt:M.txt2,fontFamily:M.fn,transition:'color 0.3s'}}>
            {speaking ? 'speaking' : 'idle'}
          </span>
        </div>
        <span style={{fontSize:9,color:M.txt3,fontFamily:M.fn,letterSpacing:'0.02em'}}>
          via ElevenLabs
        </span>
      </div>

      {/* Question */}
      <div style={{flex:1,padding:'0 16px',display:'flex',flexDirection:'column',justifyContent:'center',gap:5}}>
        <div style={{fontSize:11,color:M.txt,fontFamily:M.fn,lineHeight:1.55}}>
          {msg.q}
        </div>
        {msg.ev&&(
          <div style={{fontSize:9,color:M.txt3,fontFamily:M.fn,letterSpacing:'0.03em'}}>
            ↳ {msg.ev}
          </div>
        )}
      </div>

      {/* Input + CTA */}
      <div style={{
        width:168,borderLeft:`1px solid ${M.bdr}`,
        display:'flex',flexDirection:'column',justifyContent:'center',
        padding:'0 12px',gap:6,flexShrink:0,
      }}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          placeholder="type reply…"
          style={{
            background:'transparent',border:`1px solid ${M.bdr}`,borderRadius:2,
            padding:'5px 8px',fontSize:10,color:M.txt,fontFamily:M.fn,outline:'none',
          }}/>
        <GradientBorder gradient={theme.gradientSm} radius={2}>
          <button onClick={onNext} style={{
            display:'block',width:'100%',background:'transparent',border:'none',
            padding:'4px 8px',fontSize:9,color:M.txt2,fontFamily:M.fn,
            cursor:'pointer',textAlign:'center',letterSpacing:'0.02em',
          }}>next question →</button>
        </GradientBorder>
      </div>
    </div>
  );
}

// ── LandingScreen ─────────────────────────────────────────────────────────────
function LandingScreen({ theme, width=640, height=440 }) {
  const [val, setVal] = useState('');
  const [focused, setFocused] = useState(false);

  const suggestions = [
    'why does launch angle affect projectile range?',
    'what does a derivative mean geometrically?',
    'how do concentration gradients drive diffusion?',
  ];

  return (
    <div style={{
      width,height,background:M.bg,
      display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',gap:0,position:'relative',overflow:'hidden',
      fontFamily:M.fn,
    }}>
      {/* Dot grid */}
      <svg width={width} height={height} style={{position:'absolute',inset:0,pointerEvents:'none'}}>
        <defs>
          <pattern id={`ldg-${theme.id}`} x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
            <circle cx="0" cy="0" r="0.8" fill="rgba(255,255,255,0.07)"/>
          </pattern>
          <radialGradient id={`lmask-${theme.id}`} cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="black" stopOpacity="0"/>
            <stop offset="60%" stopColor="black" stopOpacity="0"/>
            <stop offset="100%" stopColor="black" stopOpacity="1"/>
          </radialGradient>
          <mask id={`lgm-${theme.id}`}>
            <rect width={width} height={height} fill="white"/>
            <rect width={width} height={height} fill={`url(#lmask-${theme.id})`}/>
          </mask>
        </defs>
        <rect width={width} height={height} fill={`url(#ldg-${theme.id})`} mask={`url(#lgm-${theme.id})`}/>
      </svg>

      {/* Wordmark */}
      <div style={{animation:'fadeUp 0.4s ease both',display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <LogoMark size={28}/>
        <span style={{fontFamily:M.fn,fontWeight:600,fontSize:28,letterSpacing:'-0.03em',color:M.txt}}>
          Pra<GT gradient={theme.gradient}>x</GT>io
        </span>
      </div>

      {/* Tagline */}
      <div style={{
        animation:'fadeUp 0.4s 0.08s ease both',
        fontSize:12,color:M.txt2,marginBottom:36,letterSpacing:'0.02em',
      }}>
        stop reading. start discovering.
      </div>

      {/* Input */}
      <div style={{
        animation:'fadeUp 0.4s 0.16s ease both',
        width:480,
      }}>
        <div style={{
          display:'flex',alignItems:'center',gap:0,
          border:`1px solid ${focused?M.bdr2:M.bdr}`,borderRadius:3,
          background:M.bg2,overflow:'hidden',
          transition:'border-color 0.2s',
        }}>
          <input
            value={val}
            onChange={e=>setVal(e.target.value)}
            onFocus={()=>setFocused(true)}
            onBlur={()=>setFocused(false)}
            placeholder="what's not clicking?"
            style={{
              flex:1,background:'transparent',border:'none',outline:'none',
              padding:'11px 14px',fontSize:12,color:M.txt,fontFamily:M.fn,
            }}
          />
          <div style={{width:1,height:28,background:M.bdr,flexShrink:0}}/>
          {/* CTA — gradient border */}
          <GradientBorder gradient={theme.gradient} radius={1} thickness={1}>
            <button style={{
              background:M.bg2,border:'none',borderRadius:1,
              padding:'7px 16px',fontSize:11,color:M.txt,
              fontFamily:M.fn,cursor:'pointer',whiteSpace:'nowrap',
              letterSpacing:'0.01em',
            }}>build it →</button>
          </GradientBorder>
          <div style={{width:8}}/>
        </div>
      </div>

      {/* Suggestions */}
      <div style={{
        animation:'fadeUp 0.4s 0.28s ease both',
        marginTop:20,width:480,
        display:'flex',flexDirection:'column',gap:0,
      }}>
        <div style={{fontSize:9,color:M.txt3,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>
          or try
        </div>
        {suggestions.map((s,i)=>(
          <div key={i} style={{
            padding:'7px 0',
            borderTop:`1px solid ${M.bdr}`,
            fontSize:10,color:M.txt2,fontFamily:M.fn,cursor:'pointer',
            display:'flex',alignItems:'center',gap:8,
            transition:'color 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.color=M.txt}
          onMouseLeave={e=>e.currentTarget.style.color=M.txt2}>
            <span style={{color:M.txt3,fontSize:9,flexShrink:0}}>→</span>
            {s}
          </div>
        ))}
      </div>

      {/* Footer */}
      <div style={{
        position:'absolute',bottom:14,
        fontSize:9,color:M.txt3,letterSpacing:'0.06em',
        display:'flex',gap:16,
      }}>
        {['Gemma 4','ElevenLabs','MongoDB Atlas','p5.js'].map(t=>(
          <span key={t}>{t}</span>
        ))}
      </div>

      {/* Theme label */}
      <div style={{
        position:'absolute',top:12,right:12,
        fontSize:9,color:M.txt3,fontFamily:M.fn,
        border:`1px solid ${M.bdr}`,borderRadius:2,padding:'3px 8px',
      }}>
        <GT gradient={theme.gradient}>{theme.label}</GT>
      </div>
    </div>
  );
}

// ── WorkspaceVariant ──────────────────────────────────────────────────────────
function WorkspaceVariant({ theme, width=960, height=580 }) {
  const [angle, setAngle] = useState(30);
  const [velocity, setVelocity] = useState(30);
  const [showAnnotation, setShowAnnotation] = useState(true);
  const [msgIdx, setMsgIdx] = useState(0);
  const simH = height - 38 - 72;

  return (
    <div style={{width,height,background:M.bg,display:'flex',flexDirection:'column',overflow:'hidden',fontFamily:M.fn}}>
      <TopBar theme={theme} width={width}/>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <SimCanvas angle={angle} velocity={velocity} showAnnotation={showAnnotation}
          width={width} height={simH} uid={theme.id}/>
        <ParamPanel angle={angle} velocity={velocity}
          onAngle={setAngle} onVelocity={setVelocity} theme={theme}/>
        <button onClick={()=>setShowAnnotation(v=>!v)} style={{
          position:'absolute',right:10,top:10,background:'transparent',
          border:`1px solid ${M.bdr}`,borderRadius:2,padding:'4px 10px',
          fontSize:9,color:M.txt3,fontFamily:M.fn,cursor:'pointer',
        }}>{showAnnotation?'annotations on':'annotations off'}</button>
      </div>
      <TutorStrip theme={theme} msgIdx={msgIdx}
        onNext={()=>setMsgIdx(i=>(i+1)%4)} width={width}/>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="Praxio — Concept Directions">
      <DCSection id="landing" title="Landing — Steel → Lilac vs Copper → Sand">
        {THEMES.map(t=>(
          <DCArtboard key={`l-${t.id}`} id={`l-${t.id}`} label={`Landing · ${t.label}`} width={640} height={440}>
            <LandingScreen theme={t} width={640} height={440}/>
          </DCArtboard>
        ))}
      </DCSection>
      <DCSection id="workspace" title="Workspace — Steel → Lilac vs Copper → Sand">
        {THEMES.map(t=>(
          <DCArtboard key={`w-${t.id}`} id={`w-${t.id}`} label={`Workspace · ${t.label}`} width={960} height={580}>
            <WorkspaceVariant theme={t} width={960} height={580}/>
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
